<?xml version="1.0" encoding="UTF-8"?>
<!--
  図版 1-2　v3
  タイトル：Kubernetesの宣言的制御ループ
  作成日：2026-06-08
  更新日：2026-06-18
  変更内容（v2→v3）：
    - 「宣言（Declaration）」→「Manifest (YAML)」へ変更
    - ManifestからDesired Stateへの屈曲コネクターを追加
    - 利用者からReconciliation Loopへの青矢印を削除
    - 中央パネル内コンテンツの左余白を+20px調整（左右均等化）
  レイアウト：左(320) + gap(20) + 中央(420) + 右(320)
  左：ユーザー宣言  中央：K8s制御ループ  右：クラスタ自己修復
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1120 740"
     width="1120" height="740"
     font-family="'Noto Sans JP', 'Hiragino Sans', 'Meiryo', sans-serif">

  <!-- ===== DEFS ===== -->
  <defs>
    <marker id="arr-flow" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D84315"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E75B6"/>
    </marker>
    <marker id="arr-teal" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00796B"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546E7A"/>
    </marker>
    <marker id="arr-gray-sm" markerWidth="7" markerHeight="5"
            refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#546E7A"/>
    </marker>
    <marker id="arr-blue-sm" markerWidth="7" markerHeight="5"
            refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#2E75B6"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════
       BACKGROUND
  ═══════════════════════════════════════ -->
  <rect width="1120" height="740" fill="#F5F7FA"/>

  <!-- ═══════════════════════════════════════
       TITLE BAR
  ═══════════════════════════════════════ -->
  <rect x="0" y="0" width="1120" height="54" fill="#1F4E79"/>
  <text x="560" y="34" text-anchor="middle" font-size="16" font-weight="bold"
        fill="#FFFFFF">図1-2　Kubernetesの宣言的制御ループ</text>

  <!-- ═══════════════════════════════════════
       LEFT PANEL ─ 利用者（ユーザー）宣言
  ═══════════════════════════════════════ -->
  <rect x="20" y="66" width="320" height="40" fill="#1F4E79" rx="4"/>
  <text x="180" y="82" text-anchor="middle" font-size="10" fill="#BBDEFB">
    利用者（ユーザー）
  </text>
  <text x="180" y="99" text-anchor="middle" font-size="12" font-weight="bold"
        fill="#FFFFFF">望ましい状態を定義する</text>

  <rect x="20" y="106" width="320" height="534" fill="#E0F2F1" stroke="#1F4E79"
        stroke-width="1.5"/>

  <!-- 人物アイコン -->
  <circle cx="180" cy="150" r="20" fill="#1F4E79"/>
  <rect x="163" y="172" width="34" height="42" fill="#1F4E79" rx="4"/>

  <!-- 操作しない vs 定義する -->
  <text x="180" y="232" text-anchor="middle" font-size="9" fill="#546E7A">
    「どうするか」を命令しない
  </text>
  <text x="180" y="250" text-anchor="middle" font-size="11" font-weight="bold"
        fill="#1F4E79">「どうあるべきか」を定義する</text>

  <!-- Manifest ボックス（YAMLスタイル） -->
  <rect x="38" y="262" width="264" height="104" fill="#FFFFFF" stroke="#2E75B6"
        stroke-width="2" rx="6"/>
  <rect x="38" y="262" width="264" height="20" fill="#2E75B6" rx="6"/>
  <text x="170" y="276" text-anchor="middle" font-size="9" font-weight="bold"
        fill="#FFFFFF">Manifest (YAML)</text>
  <line x1="46" y1="284" x2="294" y2="284" stroke="#DDEEFF" stroke-width="0.5"/>
  <text x="52" y="298" text-anchor="start" font-size="9" fill="#546E7A"
        font-family="'Courier New', Courier, monospace">kind: Deployment</text>
  <text x="52" y="314" text-anchor="start" font-size="10" font-weight="bold"
        fill="#1F4E79" font-family="'Courier New', Courier, monospace">replicas: 3</text>
  <text x="52" y="330" text-anchor="start" font-size="9" fill="#546E7A"
        font-family="'Courier New', Courier, monospace">image: myapp:v1.2</text>
  <text x="170" y="352" text-anchor="middle" font-size="9" font-weight="bold"
        fill="#2E75B6">→「Podを3つ動かしたい」</text>

  <!-- Desired State として渡される -->
  <text x="180" y="382" text-anchor="middle" font-size="9" fill="#2E75B6">
    Desired State として渡される ↓
  </text>
  <text x="180" y="398" text-anchor="middle" font-size="9" fill="#546E7A">
    （kubectl apply -f config.yaml）
  </text>

  <!-- 左パネル下部メッセージ -->
  <rect x="38" y="464" width="264" height="52" fill="#DDEEFF" stroke="#2E75B6"
        stroke-width="1.5" rx="5"/>
  <text x="170" y="483" text-anchor="middle" font-size="10" fill="#2E75B6">
    人はここで終わり
  </text>
  <text x="170" y="501" text-anchor="middle" font-size="11" font-weight="bold"
        fill="#1F4E79">あとは Kubernetes に任せる</text>


  <!-- ═══════════════════════════════════════
       CENTER PANEL ─ Kubernetes 宣言的制御ループ
       コンテンツ左余白+20px（x:380, right edge:760維持）
  ═══════════════════════════════════════ -->
  <rect x="360" y="66" width="420" height="40" fill="#2E75B6" rx="4"/>
  <text x="560" y="82" text-anchor="middle" font-size="10" fill="#BBDEFB">
    Kubernetes
  </text>
  <text x="560" y="99" text-anchor="middle" font-size="12" font-weight="bold"
        fill="#FFFFFF">宣言的制御ループ（Reconciliation Loop）</text>

  <rect x="360" y="106" width="420" height="534" fill="#DDEEFF" stroke="#2E75B6"
        stroke-width="1.5"/>

  <!-- ── 望ましい状態（Desired State）── -->
  <rect x="380" y="118" width="380" height="56" fill="#E0F2F1" stroke="#00796B"
        stroke-width="2" rx="4"/>
  <text x="570" y="137" text-anchor="middle" font-size="11" font-weight="bold"
        fill="#00796B">望ましい状態（Desired State）</text>
  <text x="570" y="155" text-anchor="middle" font-size="10" fill="#004D40">
    Pod: 3台を常に維持する ─ etcd に保存・管理される
  </text>
  <text x="570" y="169" text-anchor="middle" font-size="9" fill="#546E7A">
    Manifest によって定義された望ましい状態
  </text>

  <!-- 矢印 DS → Observe -->
  <line x1="570" y1="176" x2="570" y2="194" stroke="#546E7A" stroke-width="1.5"
        marker-end="url(#arr-gray)"/>

  <!-- ── ① 観測（Observe）── -->
  <rect x="380" y="196" width="380" height="50" fill="#F5F7FA" stroke="#546E7A"
        stroke-width="1.5" rx="3"/>
  <text x="570" y="215" text-anchor="middle" font-size="11" font-weight="bold"
        fill="#546E7A">① 観測（Observe）</text>
  <text x="570" y="234" text-anchor="middle" font-size="9" fill="#546E7A">
    現在のクラスタ状態を継続的に監視・取得する
  </text>

  <!-- 矢印 Observe → Diff -->
  <line x1="570" y1="248" x2="570" y2="266" stroke="#D84315" stroke-width="1.5"
        marker-end="url(#arr-flow)"/>

  <!-- ── ② 差分検出（Detect Diff）── -->
  <rect x="380" y="268" width="380" height="50" fill="#FFF3E0" stroke="#D84315"
        stroke-width="2" rx="3"/>
  <text x="570" y="287" text-anchor="middle" font-size="11" font-weight="bold"
        fill="#D84315">② 差分検出（Detect Diff）</text>
  <text x="570" y="306" text-anchor="middle" font-size="9" fill="#BF360C">
    望ましい状態 ≠ 現在の状態？ → 差分あり
  </text>

  <!-- 矢印 Diff → Reconcile -->
  <line x1="570" y1="320" x2="570" y2="338" stroke="#D84315" stroke-width="1.5"
        marker-end="url(#arr-flow)"/>

  <!-- ── ③ 修復（Reconcile）── -->
  <rect x="380" y="340" width="380" height="50" fill="#E0F2F1" stroke="#00796B"
        stroke-width="2" rx="3"/>
  <text x="570" y="359" text-anchor="middle" font-size="11" font-weight="bold"
        fill="#00796B">③ 修復（Reconcile）</text>
  <text x="570" y="378" text-anchor="middle" font-size="9" fill="#004D40">
    差分を埋める操作を自動的に実行する（Pod 新規作成 etc.）
  </text>

  <!-- ループバック線（左サイド L字型、x=346を経由） -->
  <line x1="380" y1="365" x2="346" y2="365" stroke="#546E7A" stroke-width="1.5"
        stroke-dasharray="5,3"/>
  <line x1="346" y1="365" x2="346" y2="222" stroke="#546E7A" stroke-width="1.5"
        stroke-dasharray="5,3"/>
  <line x1="346" y1="222" x2="380" y2="222" stroke="#546E7A" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arr-gray-sm)"/>

  <!-- ループインジケーター -->
  <text x="570" y="404" text-anchor="middle" font-size="9" fill="#546E7A">
    ↻ 差分がなくなるまで継続的に繰り返す
  </text>

  <!-- ── 収束（Converged）── -->
  <rect x="380" y="412" width="380" height="44" fill="#E0F2F1" stroke="#00796B"
        stroke-width="2" rx="4"/>
  <text x="570" y="430" text-anchor="middle" font-size="11" font-weight="bold"
        fill="#00796B">収束（Converged）</text>
  <text x="570" y="448" text-anchor="middle" font-size="9" fill="#004D40">
    望ましい状態 ＝ 現在の状態 → 安定
  </text>

  <!-- ── キー原則ボックス ── -->
  <rect x="380" y="466" width="380" height="52" fill="#1F4E79" rx="4"/>
  <text x="570" y="484" text-anchor="middle" font-size="10" fill="#BBDEFB">
    人が都度操作しなくても
  </text>
  <text x="570" y="503" text-anchor="middle" font-size="12" font-weight="bold"
        fill="#FFFFFF">状態が自動的に維持され続ける</text>

  <!-- パネル縦区切り -->
  <line x1="780" y1="106" x2="780" y2="640" stroke="#B0BEC5" stroke-width="1"
        stroke-dasharray="4,4"/>

  <!-- ── パネル間ブリッジ矢印 ── -->
  <line x1="762" y1="365" x2="784" y2="365" stroke="#D84315" stroke-width="1.5"
        marker-end="url(#arr-flow)"/>
  <text x="771" y="353" text-anchor="middle" font-size="8" font-weight="bold"
        fill="#D84315">作成</text>

  <line x1="784" y1="222" x2="762" y2="222" stroke="#546E7A" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arr-gray-sm)"/>
  <text x="778" y="210" text-anchor="end" font-size="8" fill="#546E7A">観測</text>

  <!-- ═══════════════════════════════════════
       RIGHT PANEL ─ 実際のクラスタ
  ═══════════════════════════════════════ -->
  <rect x="780" y="66" width="320" height="40" fill="#546E7A" rx="4"/>
  <text x="940" y="82" text-anchor="middle" font-size="10" fill="#CFD8DC">
    実際のクラスタ（Current State）
  </text>
  <text x="940" y="99" text-anchor="middle" font-size="12" font-weight="bold"
        fill="#FFFFFF">自己修復の様子</text>

  <rect x="780" y="106" width="320" height="534" fill="#ECEFF1" stroke="#546E7A"
        stroke-width="1.5"/>

  <!-- ── STATE 1: 正常稼働 ── -->
  <rect x="800" y="118" width="280" height="66" fill="#E0F2F1" stroke="#00796B"
        stroke-width="2" rx="4"/>
  <text x="940" y="136" text-anchor="middle" font-size="10" font-weight="bold"
        fill="#00796B">① 正常稼働</text>
  <rect x="898" y="144" width="24" height="18" fill="#00796B" rx="3"/>
  <text x="910" y="157" text-anchor="middle" font-size="7" fill="#FFFFFF">Pod</text>
  <rect x="928" y="144" width="24" height="18" fill="#00796B" rx="3"/>
  <text x="940" y="157" text-anchor="middle" font-size="7" fill="#FFFFFF">Pod</text>
  <rect x="958" y="144" width="24" height="18" fill="#00796B" rx="3"/>
  <text x="970" y="157" text-anchor="middle" font-size="7" fill="#FFFFFF">Pod</text>
  <text x="940" y="176" text-anchor="middle" font-size="9" fill="#004D40">3台 稼働中</text>

  <line x1="940" y1="186" x2="940" y2="208" stroke="#C62828" stroke-width="1.5"
        marker-end="url(#arr-flow)"/>
  <text x="952" y="201" text-anchor="start" font-size="9" font-weight="bold"
        fill="#C62828">障害発生</text>

  <!-- ── STATE 2: 障害発生 ── -->
  <rect x="800" y="210" width="280" height="62" fill="#FFEBEE" stroke="#C62828"
        stroke-width="2" rx="4"/>
  <text x="940" y="228" text-anchor="middle" font-size="10" font-weight="bold"
        fill="#C62828">② 1台停止（障害）</text>
  <rect x="898" y="235" width="24" height="18" fill="#00796B" rx="3"/>
  <text x="910" y="248" text-anchor="middle" font-size="7" fill="#FFFFFF">Pod</text>
  <rect x="928" y="235" width="24" height="18" fill="#00796B" rx="3"/>
  <text x="940" y="248" text-anchor="middle" font-size="7" fill="#FFFFFF">Pod</text>
  <rect x="958" y="235" width="24" height="18" fill="#C62828" rx="3" opacity="0.5"/>
  <text x="970" y="248" text-anchor="middle" font-size="9" font-weight="bold"
        fill="#FFFFFF">✕</text>
  <text x="940" y="265" text-anchor="middle" font-size="9" fill="#C62828">
    望ましい: 3台 / 現在: 2台
  </text>

  <line x1="940" y1="274" x2="940" y2="296" stroke="#D84315" stroke-width="1.5"
        marker-end="url(#arr-flow)"/>
  <text x="952" y="289" text-anchor="start" font-size="9" fill="#D84315">差分検出</text>

  <!-- ── STATE 3: Kubernetes が検知 ── -->
  <rect x="800" y="298" width="280" height="52" fill="#FFF3E0" stroke="#D84315"
        stroke-width="2" rx="4"/>
  <text x="940" y="317" text-anchor="middle" font-size="10" font-weight="bold"
        fill="#D84315">③ Kubernetes が差分を検知</text>
  <text x="940" y="337" text-anchor="middle" font-size="9" fill="#BF360C">
    Control Loop: 「1台足りない」
  </text>

  <line x1="940" y1="352" x2="940" y2="374" stroke="#D84315" stroke-width="1.5"
        marker-end="url(#arr-flow)"/>
  <text x="952" y="367" text-anchor="start" font-size="9" fill="#D84315">自動修復</text>

  <!-- ── STATE 4: Pod 作成中 ── -->
  <rect x="800" y="376" width="280" height="52" fill="#FFF3E0" stroke="#D84315"
        stroke-width="2" rx="4"/>
  <text x="940" y="395" text-anchor="middle" font-size="10" font-weight="bold"
        fill="#D84315">④ Pod を1台新規作成</text>
  <rect x="898" y="402" width="24" height="18" fill="#00796B" rx="3"/>
  <rect x="928" y="402" width="24" height="18" fill="#00796B" rx="3"/>
  <rect x="958" y="402" width="24" height="18" fill="#FFF3E0" stroke="#D84315"
        stroke-width="1.5" rx="3"/>
  <text x="970" y="415" text-anchor="middle" font-size="7" fill="#D84315">new</text>

  <line x1="940" y1="430" x2="940" y2="452" stroke="#00796B" stroke-width="1.5"
        marker-end="url(#arr-teal)"/>
  <text x="952" y="445" text-anchor="start" font-size="9" fill="#00796B">再収束</text>

  <!-- ── STATE 5: 正常状態に復帰 ── -->
  <rect x="800" y="454" width="280" height="66" fill="#E0F2F1" stroke="#00796B"
        stroke-width="2" rx="4"/>
  <text x="940" y="472" text-anchor="middle" font-size="10" font-weight="bold"
        fill="#00796B">⑤ 正常状態に戻った</text>
  <rect x="898" y="479" width="24" height="18" fill="#00796B" rx="3"/>
  <text x="910" y="492" text-anchor="middle" font-size="7" fill="#FFFFFF">Pod</text>
  <rect x="928" y="479" width="24" height="18" fill="#00796B" rx="3"/>
  <text x="940" y="492" text-anchor="middle" font-size="7" fill="#FFFFFF">Pod</text>
  <rect x="958" y="479" width="24" height="18" fill="#00796B" rx="3"/>
  <text x="970" y="492" text-anchor="middle" font-size="7" fill="#FFFFFF">Pod</text>
  <text x="940" y="511" text-anchor="middle" font-size="9" fill="#004D40">
    3台 再稼働 ─ 人は何もしていない
  </text>

  <!-- 右パネル下部まとめ -->
  <rect x="800" y="532" width="280" height="44" fill="#DDEEFF" stroke="#2E75B6"
        stroke-width="1.5" rx="5"/>
  <text x="940" y="550" text-anchor="middle" font-size="10" fill="#2E75B6">
    このループは障害が起きるたびに動く
  </text>
  <text x="940" y="568" text-anchor="middle" font-size="10" font-weight="bold"
        fill="#1F4E79">宣言した状態が常に維持される</text>

  <!-- ── Manifest → Desired State コネクター（最前面描画・外枠内ルート）
       x=330を経由：Manifest右端(x=302)と左パネル外枠(x=340)の間、loop-back(x=346)に非交差 -->
  <line x1="302" y1="314" x2="330" y2="314" stroke="#2E75B6" stroke-width="1.5"/>
  <line x1="330" y1="314" x2="330" y2="146" stroke="#2E75B6" stroke-width="1.5"/>
  <line x1="330" y1="146" x2="379" y2="146" stroke="#2E75B6" stroke-width="1.5"
        marker-end="url(#arr-blue-sm)"/>

  <!-- ═══════════════════════════════════════
       CAPTION
  ═══════════════════════════════════════ -->
  <rect x="20" y="652" width="4" height="78" fill="#2E75B6" rx="2"/>
  <text x="34" y="668" text-anchor="start" font-size="11" fill="#1F4E79">
    <tspan font-weight="bold">宣言的制御ループ：</tspan>
    <tspan>利用者は「どうするか」を命令せず、「どうなっていてほしいか（望ましい状態）」を定義するだけでよい。</tspan>
  </text>
  <text x="34" y="688" text-anchor="start" font-size="11" fill="#1F4E79">
    Kubernetes はクラスタの現在の状態を継続的に観測し、望ましい状態との差分を検知するたびに自動で修復を試みる。
  </text>
  <text x="34" y="708" text-anchor="start" font-size="11" fill="#1F4E79">
    <tspan font-weight="bold">これが宣言的制御ループ（Reconciliation Loop）である。</tspan>
    <tspan>人が都度操作しなくても、宣言した状態が自律的に維持され続ける。</tspan>
  </text>

</svg>
